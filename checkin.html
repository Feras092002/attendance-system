<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل دخول</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  margin: 0;
  padding: 20px;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 20px;
  width: 100%;
  max-width: 400px;
  margin: auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.employee {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #f5f5f5;
  padding: 12px;
  margin: 6px 0;
  border-radius: 10px;
  cursor: pointer;
}

.employee:hover {
  background: #d6eaff;
}

.employee input {
  transform: scale(1.2);
}

button {
  margin-top: 15px;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #4facfe;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

button:disabled {
  background: gray;
  cursor: not-allowed;
}

button:hover:not(:disabled) {
  background: #2e8df5;
}
</style>
</head>

<body>

<div class="container">
  <h2>📍 تسجيل دخول</h2>

  <label class="employee"><input type="radio" name="employee" value="أيمن أبو روك"> أيمن أبو روك</label>
  <label class="employee"><input type="radio" name="employee" value="شمس سمور"> شمس سمور</label>
  <label class="employee"><input type="radio" name="employee" value="اسراء موسى"> اسراء موسى</label>
  <label class="employee"><input type="radio" name="employee" value="فادي الأسطل"> فادي الأسطل</label>
  <label class="employee"><input type="radio" name="employee" value="فوزية الكردي"> فوزية الكردي</label>

  <label class="employee"><input type="radio" name="employee" value="وسيم المغربي"> وسيم المغربي</label>
  <label class="employee"><input type="radio" name="employee" value="بلال ابو روك"> بلال ابو روك</label>
  <label class="employee"><input type="radio" name="employee" value="سحر كلخ"> سحر كلخ</label>
  <label class="employee"><input type="radio" name="employee" value="اسراء العيلة"> اسراء العيلة</label>

  <label class="employee"><input type="radio" name="employee" value="نسرين محيسن"> نسرين محيسن</label>
  <label class="employee"><input type="radio" name="employee" value="فراس الفرا"> فراس الفرا</label>
  <label class="employee"><input type="radio" name="employee" value="أحمد صافي"> أحمد صافي</label>
  <label class="employee"><input type="radio" name="employee" value="جمال أبو رجيلة"> جمال أبو رجيلة</label>
  <label class="employee"><input type="radio" name="employee" value="هاني أبو مغنم"> هاني أبو مغنم</label>

  <button id="btn" onclick="sendData()">دخول</button>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzDmSTzg2llw5oYR7sHLvv071FNL2Z_JYmb9uFemK2n_ydwvg42G9i6v9_-IytM38Ljfg/exec";

const OFFICE_LAT = 31.4037;
const OFFICE_LON = 34.31997;
const MAX_DISTANCE = 300;

let deviceId = localStorage.getItem("deviceId");
if(!deviceId){
  deviceId = Math.random().toString(36).substring(2);
  localStorage.setItem("deviceId", deviceId);
}

const btn = document.getElementById("btn");

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const φ1 = lat1 * Math.PI/180;
  const φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1) * Math.PI/180;
  const Δλ = (lon2-lon1) * Math.PI/180;

  const a = Math.sin(Δφ/2)**2 +
            Math.cos(φ1)*Math.cos(φ2)*
            Math.sin(Δλ/2)**2;

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

async function sendData(){

  btn.disabled = true;
  btn.innerText = "⏳ جاري التسجيل...";

  const selected = document.querySelector('input[name="employee"]:checked');

  if(!selected){
    alert("❌ اختار اسمك");
    btn.disabled = false;
    btn.innerText = "دخول";
    return;
  }

  const name = selected.value;

  navigator.geolocation.getCurrentPosition(async (pos)=>{

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    const distance = getDistance(lat, lon, OFFICE_LAT, OFFICE_LON);
    let status = distance <= MAX_DISTANCE ? "داخل المؤسسة" : "خارج المؤسسة";

    const response = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        name: name,
        action: "checkin",
        lat: lat,
        lon: lon,
        status: status,
        ip: "N/A",
        device: deviceId
      })
    });

    const result = await response.text();

    if(result === "OK"){
      alert("✅ تم تسجيل الدخول");
    }
    else if(result === "Already checked in today"){
      alert("❌ انت مسجل اليوم بالفعل");
    }
    else if(result === "Device already used today"){
      alert("❌ هذا الجهاز سجل اليوم بالفعل");
    }
    else if(result === "Wrong user"){
      alert("❌ لا يمكنك اختيار اسم شخص آخر");
    }
    else{
      alert("❌ خطأ في التسجيل");
    }

    btn.disabled = false;
    btn.innerText = "دخول";

  }, ()=>{
    alert("❌ لازم تشغل الموقع");
    btn.disabled = false;
    btn.innerText = "دخول";
  }, {
    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 0
  });
}
</script>

</body>
</html>
