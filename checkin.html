<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل دخول</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  background: white;
  padding: 25px;
  border-radius: 20px;
  width: 320px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  text-align: center;
}

h2 {
  margin-bottom: 20px;
}

.employee {
  display: block;
  background: #f5f5f5;
  padding: 10px;
  margin: 8px 0;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
  text-align: right;
}

.employee:hover {
  background: #d6eaff;
}

.employee input {
  margin-left: 10px;
}

button {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #4facfe;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #2e8df5;
}
</style>
</head>

<body>

<div class="container">
  <h2>📍 تسجيل دخول</h2>

  <label class="employee"><input type="radio" name="employee" value="أيمن أبو روك"> أيمن أبو روك</label>
  <label class="employee"><input type="radio" name="employee" value="اسراء موسى"> اسراء موسى</label>
  <label class="employee"><input type="radio" name="employee" value="فادي الأسطل"> فادي الأسطل</label>
  <label class="employee"><input type="radio" name="employee" value="فوزية الكردي"> فوزية الكردي</label>

  <label class="employee"><input type="radio" name="employee" value="وسيم المغربي"> وسيم المغربي</label>
  <label class="employee"><input type="radio" name="employee" value="بلال ابو روك"> بلال ابو روك</label>
  <label class="employee"><input type="radio" name="employee" value="سحر كلخ"> سحر كلخ</label>
  <label class="employee"><input type="radio" name="employee" value="اسراء العيلة"> اسراء العيلة</label>

  <label class="employee"><input type="radio" name="employee" value="نسرين محيسن"> نسرين محيسن</label>
  <label class="employee"><input type="radio" name="employee" value="فراس الفرا"> فراس الفرا</label>
  <label class="employee"><input type="radio" name="employee" value="أحمد صافي"> أحمد صافي</label>
  <label class="employee"><input type="radio" name="employee" value="جمال أبو رجيلة"> جمال أبو رجيلة</label>

  <button onclick="sendData()">دخول</button>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbylW4u_qxTKmrHYiv5mP3xwvJ3_Frs3cb3hbRc2Z3o_D4lm8GBrEz1ZAGzyvgRv0La5Ng/exec";

const OFFICE_LAT = 31.4037;
const OFFICE_LON = 34.31997;

const MAX_DISTANCE = 300;

// 🔥 Device ID
let deviceId = localStorage.getItem("deviceId");
if(!deviceId){
  deviceId = Math.random().toString(36).substring(2);
  localStorage.setItem("deviceId", deviceId);
}

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const φ1 = lat1 * Math.PI/180;
  const φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1) * Math.PI/180;
  const Δλ = (lon2-lon1) * Math.PI/180;

  const a = Math.sin(Δφ/2)**2 +
            Math.cos(φ1)*Math.cos(φ2)*
            Math.sin(Δλ/2)**2;

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

async function sendData(){

  const selected = document.querySelector('input[name="employee"]:checked');

  if(!selected){
    alert("❌ اختار اسمك");
    return;
  }

  const name = selected.value;

  navigator.geolocation.getCurrentPosition(async (pos)=>{

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    const distance = getDistance(lat, lon, OFFICE_LAT, OFFICE_LON);
    let status = distance <= MAX_DISTANCE ? "داخل المؤسسة" : "خارج المؤسسة";

    const response = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        name: name,
        action: "checkin",
        lat: lat,
        lon: lon,
        status: status,
        ip: "N/A",
        device: deviceId
      })
    });

    const result = await response.text();

    if(result === "OK"){
      alert("✅ تم تسجيل الدخول");
    }
    else if(result === "Device already used"){
      alert("❌ هذا الجهاز مستخدم مسبقًا");
    }
    else if(result === "Already checked in"){
      alert("❌ انت مسجل دخول بالفعل");
    }
    else{
      alert("❌ خطأ في التسجيل");
    }

  }, ()=>{
    alert("❌ لازم تشغل الموقع");
  }, {
    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 0
  });
}
</script>

</body>
</html>
