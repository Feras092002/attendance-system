<!DOCTYPE html>
<html>
<body>
<h2>تسجيل دخول</h2>

<input type="text" id="name" placeholder="ادخل اسمك">
<button onclick="sendData()">دخول</button>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwqM1W_iSGaCXersjC91eS7RF-s2b9fOfLfOw1vDbYLgnd_PfnYg-3t2P8plnwefM1Bhg/exec";

// 📍 إحداثيات المؤسسة
const OFFICE_LAT = 31.4037;
const OFFICE_LON = 34.31997;

// 📏 المسافة المسموحة
const MAX_DISTANCE = 150;

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const φ1 = lat1 * Math.PI/180;
  const φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1) * Math.PI/180;
  const Δλ = (lon2-lon1) * Math.PI/180;

  const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
            Math.cos(φ1) * Math.cos(φ2) *
            Math.sin(Δλ/2) * Math.sin(Δλ/2);

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

async function sendData(){
  const name = document.getElementById("name").value;

  if(name.trim() === ""){
    alert("❌ الرجاء إدخال الاسم");
    return;
  }

  navigator.geolocation.getCurrentPosition(async (pos)=>{
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    const distance = getDistance(lat, lon, OFFICE_LAT, OFFICE_LON);
    let status = distance <= MAX_DISTANCE ? "داخل المؤسسة" : "خارج المؤسسة";

    // 🌐 جلب IP
    const res = await fetch("https://api.ipify.org?format=json");
    const ipData = await res.json();

    // 📱 معلومات الجهاز
    const device = navigator.userAgent;

    // 🔥 إرسال البيانات
    const response = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        name: name,
        action: "checkin",
        lat: lat,
        lon: lon,
        status: status,
        ip: ipData.ip,
        device: device
      })
    });

    const result = await response.text();

    // ✅ النتائج
    if(result === "OK"){
      alert("✅ تم تسجيل الدخول");
    }
    else if(result === "Device already used"){
      alert("❌ هذا الجهاز أو الشبكة مستخدمة مسبقًا");
    }
    else if(result === "Already checked in"){
      alert("❌ انت مسجل دخول بالفعل");
    }
    else{
      alert("❌ لا يمكن تسجيل الدخول");
    }

  }, ()=>{
    alert("❌ لازم تسمح بالوصول للموقع");
  });
}
</script>

</body>
</html>
