<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbylW4u_qxTKmrHYiv5mP3xwvJ3_Frs3cb3hbRc2Z3o_D4lm8GBrEz1ZAGzyvgRv0La5Ng/exec";

const OFFICE_LAT = 31.4037;
const OFFICE_LON = 34.31997;

const MAX_DISTANCE = 300;

// 🔥 Device ID
let deviceId = localStorage.getItem("deviceId");
if(!deviceId){
  deviceId = Math.random().toString(36).substring(2);
  localStorage.setItem("deviceId", deviceId);
}

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const φ1 = lat1 * Math.PI/180;
  const φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1) * Math.PI/180;
  const Δλ = (lon2-lon1) * Math.PI/180;

  const a = Math.sin(Δφ/2)**2 +
            Math.cos(φ1)*Math.cos(φ2)*
            Math.sin(Δλ/2)**2;

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

async function sendData(){

  const selected = document.querySelector('input[name="employee"]:checked');

  if(!selected){
    alert("❌ اختار اسمك");
    return;
  }

  const name = selected.value;

  navigator.geolocation.getCurrentPosition(async (pos)=>{

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    const distance = getDistance(lat, lon, OFFICE_LAT, OFFICE_LON);
    let status = distance <= MAX_DISTANCE ? "داخل المؤسسة" : "خارج المؤسسة";

    const response = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        name: name,
        action: "checkin",
        lat: lat,
        lon: lon,
        status: status,
        ip: "N/A",
        device: deviceId
      })
    });

    const result = await response.text();

    // ✅ الرسائل المحدثة
    if(result === "OK"){
      alert("✅ تم تسجيل الدخول");
    }
    else if(result === "Device already used today"){
      alert("❌ هذا الجهاز سجل اليوم بالفعل");
    }
    else if(result === "Wrong user"){
      alert("❌ لا يمكنك اختيار اسم شخص آخر");
    }
    else if(result === "Already checked in"){
      alert("❌ انت مسجل دخول بالفعل");
    }
    else{
      alert("❌ خطأ في التسجيل");
    }

  }, ()=>{
    alert("❌ لازم تشغل الموقع");
  }, {
    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 0
  });
}
</script>
