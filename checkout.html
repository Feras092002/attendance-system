<!DOCTYPE html>
<html>
<body>
<h2>تسجيل خروج</h2>

<input type="text" id="name" placeholder="ادخل اسمك">
<button onclick="sendData()">خروج</button>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzPJjjgY7CpJCmAXGi_L8_WbrphSsmNB_qc7CaW01GoztobZqmpI_eJZ6_rftcjM4b1bw/exec";

const OFFICE_LAT = 31.4037;
const OFFICE_LON = 34.31997;

const MAX_DISTANCE = 150;

// 🔥 نفس Device ID
let deviceId = localStorage.getItem("deviceId");
if(!deviceId){
  deviceId = Math.random().toString(36).substring(2);
  localStorage.setItem("deviceId", deviceId);
}

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const φ1 = lat1 * Math.PI/180;
  const φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1) * Math.PI/180;
  const Δλ = (lon2-lon1) * Math.PI/180;

  const a = Math.sin(Δφ/2)**2 +
            Math.cos(φ1)*Math.cos(φ2)*
            Math.sin(Δλ/2)**2;

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

async function sendData(){
  const name = document.getElementById("name").value;

  if(name.trim() === ""){
    alert("❌ ادخل الاسم");
    return;
  }

  navigator.geolocation.getCurrentPosition(async (pos)=>{
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    const distance = getDistance(lat, lon, OFFICE_LAT, OFFICE_LON);
    let status = distance <= MAX_DISTANCE ? "داخل المؤسسة" : "خارج المؤسسة";

    const response = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify({
        name: name,
        action: "checkout",
        lat: lat,
        lon: lon,
        status: status,
        ip: "N/A",
        device: deviceId
      })
    });

    const result = await response.text();

    if(result === "OK"){
      alert("✅ تم تسجيل الخروج");
    }
    else if(result === "Device already used"){
      alert("❌ هذا الجهاز مستخدم مسبقًا");
    }
    else if(result === "Cannot checkout"){
      alert("❌ لازم تسجل دخول أول");
    }
    else{
      alert("❌ خطأ في العملية");
    }

  }, ()=>{
    alert("❌ لازم تشغل الموقع");
  });
}
</script>

</body>
</html>
